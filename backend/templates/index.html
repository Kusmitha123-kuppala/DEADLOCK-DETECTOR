<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Deadlock Detection Tool</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <div class="card">
        <h1>🚦 Automated Deadlock Detection</h1>
        <p class="subtitle">
            Analyze process–resource graphs and detect circular wait conditions
        </p>

        <div id="setup" class="setup-section">
            <div class="input-group">
                <label>Processes:</label>
                <input type="number" id="numP" value="2" min="1" max="10">
            </div>
            <div class="input-group">
                <label>Resources:</label>
                <input type="number" id="numR" value="2" min="1" max="10">
            </div>
            <button id="generateBtn" class="secondary-btn">⚙️ Generate Matrices</button>
        </div>

        <div id="matrixContainer" class="matrix-container hidden">
            <div class="matrix-box">
                <h4>Allocation Matrix</h4>
                <div id="allocationTable"></div>
            </div>
            <div class="matrix-box">
                <h4>Request Matrix</h4>
                <div id="requestTable"></div>
            </div>
        </div>

        <!-- ✅ BUTTON (no onclick needed) -->
        <button id="runBtn" class="run-btn hidden">
            ▶ Run Deadlock Detection
        </button>

        <div id="status" class="status hidden"></div>

        <div id="graph" class="graph hidden">
            <h3>🔗 Resource Allocation Graph</h3>
            <div id="graphBox" class="graph-box"></div>
        </div>
    </div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="{{ url_for('static', filename='graph.js') }}"></script>
<script src="{{ url_for('static', filename='app.js') }}"></script>

</body>
</html>
